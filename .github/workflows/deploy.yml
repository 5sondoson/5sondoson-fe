name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Actions 탭에서 수동 실행 가능

# OIDC 인증을 위한 권한 (이거 없으면 인증 실패)
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: 린트 검사
        run: pnpm lint

      - name: 빌드
        run: pnpm build
        env:
          HUSKY: 0
          # 환경변수 더 있으면 여기에 추가
          # VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: AWS 자격증명 설정 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ap-northeast-2

      - name: S3 정적 자산 업로드 (해시 파일 - 영구 캐싱)
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }}/ \\
            --delete \\
            --cache-control "public, max-age=31536000, immutable" \\
            --exclude "index.html" \\
            --exclude "mockServiceWorker.js"

      - name: S3 index.html 업로드 (캐싱 금지)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html \\
            --cache-control "public, max-age=0, must-revalidate" \\
            --content-type "text/html; charset=utf-8"

      - name: S3 MSW 워커 업로드 (있다면, 캐싱 금지)
        run: |
          if [ -f dist/mockServiceWorker.js ]; then
            aws s3 cp dist/mockServiceWorker.js s3://${{ secrets.AWS_S3_BUCKET }}/mockServiceWorker.js \\
              --cache-control "public, max-age=0, must-revalidate" \\
              --content-type "application/javascript"
          fi

      - name: CloudFront 캐시 무효화
        run: |
          aws cloudfront create-invalidation \\
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \\
            --paths "/index.html" "/" "/mockServiceWorker.js"
